<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Excel Colorizer</title>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 12px; }
    input, button { margin: 8px 0; }
    #log { white-space: pre-wrap; background: #f3f3f3; padding: 8px; height: 180px; overflow: auto; }
  </style>
</head>
<body>
  <h3>Excel Paint Code Colorizer</h3>
  <input type="file" id="fileInput" accept=".xls,.xlsx" />
  <br />
  <button id="readBtn">Đọc Excel</button>
  <div id="log"></div>

  <script src="app.js"></script>
</body>
</html>
