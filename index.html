<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Excel Colorizer</title>

  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 12px;
      margin: 0;
    }

    h3 {
      margin: 0 0 12px 0;
    }

    input, button {
      margin: 6px 0;
    }

    #log {
      white-space: pre-wrap;
      background: #f3f3f3;
      padding: 8px;
      height: 280px;
      overflow: auto;
      margin-top: 8px;
      border: 1px solid #ddd;
    }

    .hint {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <h3>Excel Paint Code Colorizer</h3>

  <input type="file" id="fileInput" accept=".xls,.xlsx" />
  <br />
  <button id="readBtn">Đọc Excel</button>

  <div class="hint">
    Có trong Excel = xanh, không có trong Excel = xám
  </div>

  <div id="log"></div>

  <script src="app.js?v=4"></script>
</body>
</html>
